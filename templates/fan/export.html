<!DOCTYPE html>
<html>
<head>
    <title>Экспорт данных</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; }
        .navbar { background-color: #343a40; padding: 10px 0; position: fixed; width: 100%; top: 0; }
        .navbar ul { list-style: none; margin: 0; padding: 0; display: flex; justify-content: center; }
        .navbar li { margin: 0 15px; }
        .navbar a { color: white; text-decoration: none; font-weight: bold; }
        .navbar a:hover { color: #007bff; }
        .content { padding: 20px; margin-top: 60px; text-align: center; }
        .export-form { margin-bottom: 20px; }
        .export-form label { margin-right: 10px; }
        .export-form button { padding: 5px 10px; background-color: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; }
        .export-form button:hover { background-color: #0056b3; }
        .error { color: red; }
    </style>
</head>
<body>
    <nav class="navbar">
        <ul>
            <li><a href="{% url 'profile' %}">Профиль</a></li>
            <li><a href="{% url 'schedule' %}">Расписание</a></li>
            <li><a href="{% url 'user_preference_create' %}">Добавить предпочтение</a></li>
            <li><a href="{% url 'export' %}">Экспорт</a></li>
            <li><a href="{% url 'logout' %}">Выйти</a></li>
        </ul>
    </nav>
    <div class="content">
        <h2>Экспорт данных</h2>
        {% if error %}
            <p class="error">{{ error }}</p>
        {% endif %}
        <form class="export-form" method="POST">
            {% csrf_token %}
            <label><input type="checkbox" name="export_fan_match"> Экспортировать fan_match</label><br>
            <label><input type="radio" name="export_type" value="excel" checked> Excel</label>
            <label><input type="radio" name="export_type" value="html"> HTML</label><br>
            <button type="submit">Экспортировать</button>
        </form>
    </div>
</body>
</html>
