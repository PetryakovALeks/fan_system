<!DOCTYPE html>
<html>
<head>
    <title>Обновить матч</title>
    <script>
        function validateForm() {
            const opponent = document.getElementsByName('opponent')[0].value;
            const pattern = /^[А-ЯЁ][а-яё]+$/;
            if (!pattern.test(opponent)) {
                alert("Противник должен начинаться с заглавной буквы и содержать только кириллические буквы.");
                return false;
            }
            return true;
        }
    </script>
</head>
<body>
    <h2>Обновить матч</h2>
    <form method="post" onsubmit="return validateForm()">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Обновить</button>
        {% if errors %}<p style="color: red;">{{ errors.opponent.0 }}</p>{% endif %}
    </form>
    <a href="{% url 'match_list' %}">Назад к списку</a>
</body>
</html>
